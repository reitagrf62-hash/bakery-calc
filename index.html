<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烘焙量計算機 1.0</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/200/coffee-beans.png">
    <link rel="icon" href="https://img.icons8.com/plasticine/200/coffee-beans.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand-color: #A67351; --bg-color: #F4F3F0; --dark-card: #262626; }
        body { 
            background-color: var(--bg-color); 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            color: #403E3D;
            overscroll-behavior-y: contain; /* 防止下拉重新整理影響操作 */
        }
        .main-container { width: 100%; max-width: 440px; margin: 0 auto; padding: 24px 16px; }
        .glass-card { background: #FFFFFF; border-radius: 24px; padding: 24px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.01); }
        .dark-panel { background: var(--dark-card); border-radius: 28px; padding: 28px; color: #FFFFFF; box-shadow: 0 20px 40px rgba(0,0,0,0.12); margin-bottom: 16px; }
        .conclusion-card { background: var(--brand-color); border-radius: 24px; padding: 32px 24px; color: #FFFFFF; text-align: center; box-shadow: 0 12px 30px rgba(166, 115, 81, 0.25); }
        .input-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #F6F6F6; white-space: nowrap; }
        .input-item:last-child { border-bottom: none; }
        input[type="number"], .name-input { border: none; background: transparent; font-weight: 700; color: #2F2D2C; font-size: 1.1rem; outline: none; text-align: right; width: 100%; }
        .name-input { font-weight: 500; font-size: 15px; color: #8C8C8C; }
        
        /* 滑桿樣式優化 */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; margin: 20px 0; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #444; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #FFF; cursor: pointer; margin-top: -9px; border: 2px solid var(--brand-color); }
        
        .stat-label { font-size: 11px; color: #A6A6A6; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
        .stat-value { font-size: 1.25rem; font-weight: 900; color: #2F2D2C; }
        .dark-stat-label { font-size: 11px; color: #737373; font-weight: 500; letter-spacing: 0.05em; white-space: nowrap; }
        .final-number-container { display: inline-flex; align-items: baseline; justify-content: center; gap: 8px; width: 100%; margin-top: 4px; }
        .final-val { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em; }
        .unit-text { font-size: 1.25rem; font-weight: 500; opacity: 0.9; }
        .small-unit { font-size: 10px; font-weight: 500; color: #595959; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="main-container space-y-4">
        <div class="py-2 text-center">
            <p class="text-[10px] font-bold text-[#BFBFBF] tracking-[0.5em] uppercase mb-1">Bakery Logic Studio</p>
            <h1 class="text-xl font-black text-[#262626] tracking-tight">烘焙量計算機 1.0</h1>
        </div>

        <div class="glass-card">
            <div class="input-item border-b border-[#F9F9F9] mb-2">
                <span class="text-sm font-bold text-[#A67351] mr-4">品項名稱</span>
                <input type="text" class="name-input" placeholder="請輸入品項名稱...">
            </div>
            <div class="input-item">
                <span class="text-sm font-bold">上週庫存總量</span>
                <div class="flex items-center gap-2">
                    <input type="number" id="lastStock" value="30" oninput="calcAll()">
                    <span class="text-[10px] font-bold text-[#D1D1D1]">包</span>
                </div>
            </div>
            <div class="input-item">
                <span class="text-sm font-bold">本週庫存總量</span>
                <div class="flex items-center gap-2">
                    <input type="number" id="thisStock" value="12" oninput="calcAll()">
                    <span class="text-[10px] font-bold text-[#D1D1D1]">包</span>
                </div>
            </div>
            <div class="input-item">
                <span class="text-sm font-bold text-[#D35400]">欠貨數量</span>
                <div class="flex items-center gap-2">
                    <input type="number" id="debtStock" value="0" oninput="calcAll()" style="color: #D35400;">
                    <span class="text-[10px] font-bold text-[#D1D1D1]">包</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card py-5 text-center">
                <p class="stat-label mb-1">每週銷量</p>
                <p class="stat-value" id="weekSale">0.0</p>
            </div>
            <div class="glass-card py-5 text-center">
                <p class="stat-label mb-1">每日銷量</p>
                <p class="stat-value" id="daySale">0.0</p>
            </div>
        </div>

        <div class="dark-panel">
            <div class="grid grid-cols-2 gap-4 mb-6 border-b border-white/[0.05] pb-6">
                <div>
                    <p class="dark-stat-label mb-1">現有庫存待售天數</p>
                    <p class="text-2xl font-bold text-white"><span id="daysAvailable">0.0</span><span class="small-unit">天</span></p>
                </div>
                <div class="text-right border-l border-white/[0.05] pl-4">
                    <p class="dark-stat-label mb-1">需要備貨天數</p>
                    <p class="text-2xl font-bold text-white"><span id="daysNeeded">0.0</span><span class="small-unit">天</span></p>
                </div>
            </div>
            <div class="bg-white/[0.03] rounded-2xl p-4 border border-white/[0.05] mb-8 flex justify-between items-center">
                <span class="text-xs font-bold text-[#A67351] tracking-widest">需備貨包數</span>
                <p class="text-2xl font-black text-white"><span id="neededPacks">0.0</span><span class="small-unit">包</span></p>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-white tracking-widest">模擬生產設定</span>
                    <span class="text-[10px] text-[#595959] font-medium">調整模擬鍋數</span>
                </div>
                <input type="range" id="potSlider" min="0" max="10" step="1" value="1" oninput="calcAll()">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/[0.02] rounded-2xl p-4 border border-white/[0.04] text-center">
                        <p class="dark-stat-label mb-1">鍋數</p>
                        <p class="text-2xl font-black text-white" id="sliderPots">1</p>
                    </div>
                    <div class="bg-white/[0.02] rounded-2xl p-4 border border-white/[0.04] text-center">
                        <p class="dark-stat-label mb-1">預計可販售天數</p>
                        <p class="text-2xl font-black text-[var(--brand-color)]" id="futureDays">0.0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="conclusion-card">
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] mb-1 opacity-70">System Recommendation</p>
            <p class="text-sm font-medium">建議鍋數</p>
            <div class="final-number-container">
                <span class="final-val" id="finalValue">0.5</span>
                <span class="unit-text">鍋</span>
            </div>
        </div>
    </div>

    <script>
        const PER_BATCH = 30;
        function calcAll() {
            const last = parseFloat(document.getElementById('lastStock').value) || 0;
            const now = parseFloat(document.getElementById('thisStock').value) || 0;
            const debt = parseFloat(document.getElementById('debtStock').value) || 0;
            const pots = parseInt(document.getElementById('potSlider').value);
            
            const weekSale = (last - now) + debt; 
            const daySale = weekSale / 7;
            const daysLeft = daySale > 0 ? now / daySale : 0;
            const daysFill = Math.max(0, 10 - daysLeft);
            const neededPacks = daysFill * daySale;
            const recPots = daySale > 0 ? (daysFill * daySale) / PER_BATCH : 0;
            const forecast = daySale > 0 ? ((pots * PER_BATCH) + now) / daySale : 0;

            document.getElementById('weekSale').innerText = weekSale.toFixed(1);
            document.getElementById('daySale').innerText = daySale.toFixed(1);
            document.getElementById('daysAvailable').innerText = daysLeft.toFixed(1);
            document.getElementById('daysNeeded').innerText = daysFill.toFixed(1);
            document.getElementById('neededPacks').innerText = neededPacks.toFixed(1);
            document.getElementById('sliderPots').innerText = pots;
            document.getElementById('futureDays').innerText = forecast.toFixed(1);
            document.getElementById('finalValue').innerText = recPots.toFixed(1);
        }
        window.onload = calcAll;
    </script>
</body>
</html>
